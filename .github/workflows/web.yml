name: Web

# Build verification on PRs, and automated deployment to aprovan.com/chat on
# main — using the exact same script you can run locally
# (scripts/deploy-web.sh). CI only supplies AWS credentials via OIDC; bucket /
# distribution / Cognito config is discovered from SSM parameters published by
# the core infra.
#
# Required repository configuration:
#   vars.AWS_DEPLOY_ROLE_ARN — OIDC role to assume (core CiStack's shared
#       deploy role; its trust policy includes repo:AprovanLabs/patchwork:*).
# Optional overrides (otherwise resolved from SSM): vars.WEB_BUCKET,
#   vars.CLOUDFRONT_DISTRIBUTION_ID.

on:
  pull_request:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: patchwork-web-deploy
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # No AWS credentials on PRs — build with auth/gateway config disabled.
      - run: pnpm --filter @aprovan/patchwork-web build
        env:
          APROVAN_ENV: off

  deploy:
    if: github.ref == 'refs/heads/main' && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    environment: production
    env:
      ENVIRONMENT: prd
      # Explicit overrides win over SSM discovery when set as repo vars.
      WEB_BUCKET: ${{ vars.WEB_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2
      - name: Deploy
        run: ./scripts/deploy-web.sh
