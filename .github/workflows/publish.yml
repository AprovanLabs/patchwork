name: Publish Packages to NPM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  HUSKY: 0

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      # `...` suffix: also build workspace dependencies (topological order) —
      # @aprovan/patchwork-mcp needs @aprovan/patchwork-compiler's dist.
      - name: Build packages
        run: pnpm --filter "@aprovan/patchwork..." --filter "@aprovan/patchwork-mcp..." build

      - name: Append dev SHA to versions
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          pnpm --filter @aprovan/patchwork --filter @aprovan/patchwork-mcp exec -- sh -c 'npm pkg set version="$(npm pkg get version | tr -d \")-dev.'"$SHORT_SHA"'"'

      - name: Publish packages
        run: pnpm --filter @aprovan/patchwork --filter @aprovan/patchwork-mcp publish --no-git-checks --access public --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
